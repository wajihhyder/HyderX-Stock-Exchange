{% extends "layout.html" %}

{% block title %}
    Quote
{% endblock %}

{% block main %}
    <form action="/quote" method="post">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="symbol" placeholder="Stock Symbol" type="text">
        </div>
        <button class="btn btn-primary" type="submit">Get Stock Quote</button>
    </form>
    <hr>
    <h1>{{quote.symbol}}</h1>
    <h2>{{quote.price}}</h2>
{% endblock %}
